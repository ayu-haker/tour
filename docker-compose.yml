version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.4-alpine
    container_name: tour-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: tourapp123
      MYSQL_DATABASE: tour_app
      MYSQL_USER: tour_user
      MYSQL_PASSWORD: tour_pass123
      TZ: 'Asia/Kolkata'
    ports:
      - "3306:3306"
    volumes:
      # Persist database data
      - mysql_data:/var/lib/mysql
      # Optional: Initialize database with SQL file
      # - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptourapp123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tour-network

  # Node.js Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: tourapp123
      DB_NAME: tour_app
      # Add other environment variables as needed:
      # SUPABASE_URL: ${SUPABASE_URL}
      # SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # AVIATIONSTACK_KEY: ${AVIATIONSTACK_KEY}
      # RAPIDAPI_KEY: ${RAPIDAPI_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - tour-network

volumes:
  mysql_data:
    driver: local

networks:
  tour-network:
    driver: bridge
