services:
  mysql:
    image: mysql:8.0
    container_name: tour-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tour_app
      MYSQL_USER: tour_user
      MYSQL_PASSWORD: tour_pass123
      TZ: "Asia/Kolkata"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tour-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tour-network

volumes:
  mysql_data:
    driver: local

networks:
  tour-network:
    driver: bridge
